project:
  name: legal-rag-assistant

paths:
  docs_dir: data/processed
  index_dir: indexes/faiss

retrieval:
  similarity_top_k: 3
  keyword_top_k: 4
  semantic_top_k: 4
  final_top_k: 2

model:
  provider: ollama
  llm_model: deepseek-r1:8b
  temperature: 0.1
  request_timeout_sec: 900
  max_retries: 1

  embedding_type: local
  embedding_model: models/bge-small-zh-v1.5
  embedding_dim: 384

  api_base: http://localhost:11434/v1

output:
  use_json_schema: false
